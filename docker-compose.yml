services:
#  mongodb:
#    image: mongo:8
#    container_name: knowledge_mongodb
#    ports:
#      - "2017:2017"
#    volumes:
#      - ./mongo_data:/data/db
#    networks:
#      - ai_agent_net

  qdrant:
    image: qdrant/qdrant:v1.14.1
    container_name: qdrant_db
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    networks:
      - ai_agent_net

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    networks:
      - ai_agent_net

  knowledge_service:
    build:
      context: ./services/knowledge_service
    container_name: knowledge_service
    ports:
      - "8000:8000"
    environment:
      - SERVICE_API_KEY=${SERVICE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_BASE_URL=http://ollama:11434/v1
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:3b}
      - VISION_PROVIDER=${VISION_PROVIDER:-openai}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_VISION_MODEL=${OPENAI_VISION_MODEL:-gpt-4o}
      - ANTHROPIC_VISION_MODEL=${ANTHROPIC_VISION_MODEL:-claude-sonnet-4-5}
      - EXCEL_SOURCE_DIR=/app/project_data/excel_sources
      - NOTEBOOKLM_OUTPUT_DIR=/app/project_data/docs/imported
      - NOTEBOOKLM_AUTH_DIR=/app/project_data/notebooklm_auth
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:2017}
      - MONGODB_DB_NAME=${MONGODB_DB_NAME:-knowledge_service}
    env_file:
      - .env
    volumes:
      - .:/app/project_data
    depends_on:
      - qdrant
      - ollama
    networks:
      - ai_agent_net
      - shared_network

  agent_service:
    build:
      context: ./services/agent_service
    container_name: agent_service
    ports:
      - "8001:8001"
    environment:
      - SERVICE_API_KEY=${SERVICE_API_KEY}
    env_file:
      - .env
    volumes:
      - .:/app/project_data
    #  - /var/run/docker.sock:/var/run/docker.sock # Nếu cần tương tác với Docker
    depends_on:
      - qdrant
      - knowledge_service
    networks:
      - ai_agent_net
      - shared_network

networks:
  ai_agent_net:
    driver: bridge
  shared_network:
    external: true
    name: docker_global_bridge
