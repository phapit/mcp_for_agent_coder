# version: '3.8'
#
# Hardening chung: chặn leo thang đặc quyền và bỏ toàn bộ Linux capabilities
# (các service chỉ cần bind port >1024 và I/O file thường).
x-hardening: &hardening
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  restart: unless-stopped

services:
#  mongodb:
#    image: mongo:8
#    container_name: knowledge_mongodb
#    ports:
#      - "2017:2017"
#    volumes:
#      - ./mongo_data:/data/db
#    networks:
#      - ai_agent_net

  qdrant:
    <<: *hardening
    image: qdrant/qdrant:v1.14.1
    container_name: qdrant_db
    # Chỉ bind loopback: container nội bộ gọi qua ai_agent_net,
    # host chỉ truy cập được từ chính máy này (kèm API key).
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    environment:
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY}
    volumes:
      - ./app_data/qdrant_storage:/qdrant/storage
    networks:
      - ai_agent_net

  redis:
    <<: *hardening
    image: redis:7-alpine
    container_name: notebooklm_redis
    # Chỉ dùng làm distributed lock/throttle cho NotebookLM CLI (xem
    # notebooklm_lock.py) — dữ liệu ephemeral, không cần persistence,
    # không cần expose ra ngoài ai_agent_net.
    # user=999:1000 (uid/gid "redis" có sẵn trong image): chạy thẳng non-root,
    # bỏ qua bước gosu hạ quyền trong entrypoint — bước đó cần CAP_SETUID/
    # CAP_SETGID, vốn đã bị x-hardening cap_drop: ALL chặn.
    user: "999:1000"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    networks:
      - ai_agent_net

  ollama:
    <<: *hardening
    image: ollama/ollama:latest
    container_name: ollama
    # Không có xác thực → không publish ra LAN, chỉ bind loopback cho debug từ host.
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ./app_data/ollama_data:/root/.ollama
    networks:
      # Alias riêng để tránh trùng tên "ollama" với container khác trên
      # docker_global_bridge (backend-ollama-1) khiến DNS trỏ nhầm.
      ai_agent_net:
        aliases:
          - wiki-ollama

  knowledge_service:
    <<: *hardening
    build:
      context: ./services/knowledge_service
    container_name: knowledge_service
    ports:
      - "${KNOWLEDGE_SERVICE_PORT:-8002}"
    environment:
      - SERVICE_API_KEY=${SERVICE_API_KEY}
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_BASE_URL=http://wiki-ollama:11434/v1
      # llama2 không có tag 3b (chỉ 7b/13b/70b); model đúng là llama3.2:3b
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:3b}
      - VISION_PROVIDER=${VISION_PROVIDER:-openai}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_VISION_MODEL=${OPENAI_VISION_MODEL:-gpt-4o}
      - ANTHROPIC_VISION_MODEL=${ANTHROPIC_VISION_MODEL:-claude-sonnet-4-5}
      - EXCEL_SOURCE_DIR=/app/project_data/excel_sources
      - NOTEBOOKLM_OUTPUT_DIR=/app/project_data/docs/imported
      - NOTEBOOKLM_AUTH_DIR=/app/project_data/notebooklm_auth
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:2017}
      - MONGODB_DB_NAME=${MONGODB_DB_NAME:-knowledge_service}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - NOTEBOOKLM_LOCK_LEASE_S=${NOTEBOOKLM_LOCK_LEASE_S:-600}
      - NOTEBOOKLM_LOCK_WAIT_TIMEOUT_S=${NOTEBOOKLM_LOCK_WAIT_TIMEOUT_S:-600}
      - NOTEBOOKLM_THROTTLE_MIN_DELAY_S=${NOTEBOOKLM_THROTTLE_MIN_DELAY_S:-2}
      - NOTEBOOKLM_THROTTLE_MAX_DELAY_S=${NOTEBOOKLM_THROTTLE_MAX_DELAY_S:-4}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-120}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - KAFKA_ENABLED=${KAFKA_ENABLED:-0}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      - KAFKA_SECURITY_PROTOCOL=${KAFKA_SECURITY_PROTOCOL:-SASL_SSL}
      - KAFKA_SASL_MECHANISM=${KAFKA_SASL_MECHANISM:-PLAIN}
      - KAFKA_SASL_USERNAME=${KAFKA_SASL_USERNAME:-}
      - KAFKA_SASL_PASSWORD=${KAFKA_SASL_PASSWORD:-}
      - KAFKA_SSL_CA_LOCATION=${KAFKA_SSL_CA_LOCATION:-/app/project_data/secrets/kafka-ca-cert.pem}
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-20}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - ENVIRONMENT=${ENVIRONMENT:-local}
      - MAX_INGEST_ATTEMPTS=${MAX_INGEST_ATTEMPTS:-3}
      - HYBRID_SEARCH_ENABLED=${HYBRID_SEARCH_ENABLED:-1}
      - RERANK_ENABLED=${RERANK_ENABLED:-0}
      - RERANK_MODEL=${RERANK_MODEL:-cross-encoder/mmarco-mMiniLMv2-L12-H384-v1}
      - MIN_SCORE_THRESHOLD=${MIN_SCORE_THRESHOLD:-0.35}
      - MIN_RERANK_SCORE=${MIN_RERANK_SCORE:-0.3}
      - PROMPT_VERSION=${PROMPT_VERSION:-v2}
      - AUTO_INGEST_AFTER_EXPORT=${AUTO_INGEST_AFTER_EXPORT:-1}
      - SESSION_CONTEXT_TURNS=${SESSION_CONTEXT_TURNS:-5}
      - VIRTUAL_HOST=${KNOWLEDGE_SERVICE_HOST:-knowledge-api.mcp.local}
      - VIRTUAL_PROTO=http
      - VIRTUAL_PORT=${KNOWLEDGE_SERVICE_PORT:-8002}
      - HTTPS_METHOD=noredirect
      - CERT_NAME=default.local
    env_file:
      - .env
    volumes:
      - ./app_data/secrets:/app/project_data/secrets
      - ./scripts:/app/project_data/scripts
      - ./services:/app/project_data/services
      - ./app_data/notebooklm_auth:/app/project_data/notebooklm_auth
      - ./docs:/app/project_data/docs
      - ./app_data/excel_sources:/app/project_data/excel_sources
      # Cache model HuggingFace trên host để không phải tải lại (~2 phút) mỗi lần recreate.
      - ./app_data/hf_cache:/home/appuser/.cache/huggingface

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${KNOWLEDGE_SERVICE_PORT:-8002}/health/ready', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    depends_on:
      - qdrant
      - ollama
      - redis
    networks:
      - ai_agent_net
      - shared_network

  agent_service:
    <<: *hardening
    build:
      context: ./services/agent_service
    container_name: agent_service
    ports:
      - "${AGENT_SERVICE_PORT:-8003}"
    environment:
      - SERVICE_API_KEY=${SERVICE_API_KEY}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-120}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - KNOWLEDGE_SERVICE_URL=http://knowledge_service:${KNOWLEDGE_SERVICE_PORT:-8002}
      - VIRTUAL_HOST=${AGENT_SERVICE_HOST:-agent-api.mcp.local}
      - VIRTUAL_PROTO=http
      - VIRTUAL_PORT=${AGENT_SERVICE_PORT:-8003}
      - HTTPS_METHOD=noredirect
      - CERT_NAME=default.local
    env_file:
      - .env
    volumes:
      # Service git cần cả working tree lẫn .git; che .env và app_data
      # (secrets, qdrant/ollama data) để không lộ vào container.
      - .:/app/project_data
      - /dev/null:/app/project_data/.env:ro
      - /app/project_data/app_data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${AGENT_SERVICE_PORT:-8003}/health/ready', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      - qdrant
      - knowledge_service
    networks:
      - ai_agent_net
      - shared_network

networks:
  ai_agent_net:
    driver: bridge
  shared_network:
    external: true
    name: docker_global_bridge
