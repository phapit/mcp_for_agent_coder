services:
#  mongodb:
#    image: mongo:8
#    container_name: knowledge_mongodb
#    ports:
#      - "2017:2017"
#    volumes:
#      - ./mongo_data:/data/db
#    networks:
#      - ai_agent_net

  qdrant:
    image: qdrant/qdrant:v1.14.1
    container_name: qdrant_db
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    networks:
      - ai_agent_net

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ./ollama_data:/root/.ollama
    networks:
      - ai_agent_net

  knowledge_service:
    build:
      context: ./services/knowledge_service
    container_name: knowledge_service
    ports:
      - "8002"
    environment:
      - SERVICE_API_KEY=${SERVICE_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OLLAMA_BASE_URL=http://ollama:11434/v1
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:3b}
      - VISION_PROVIDER=${VISION_PROVIDER:-openai}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_VISION_MODEL=${OPENAI_VISION_MODEL:-gpt-4o}
      - ANTHROPIC_VISION_MODEL=${ANTHROPIC_VISION_MODEL:-claude-sonnet-4-5}
      - EXCEL_SOURCE_DIR=/app/project_data/excel_sources
      - NOTEBOOKLM_OUTPUT_DIR=/app/project_data/docs/imported
      - NOTEBOOKLM_AUTH_DIR=/app/project_data/notebooklm_auth
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:2017}
      - MONGODB_DB_NAME=${MONGODB_DB_NAME:-knowledge_service}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-120}
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-20}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - ENVIRONMENT=${ENVIRONMENT:-local}
      - MAX_INGEST_ATTEMPTS=${MAX_INGEST_ATTEMPTS:-3}
      - HYBRID_SEARCH_ENABLED=${HYBRID_SEARCH_ENABLED:-1}
      - RERANK_ENABLED=${RERANK_ENABLED:-0}
      - RERANK_MODEL=${RERANK_MODEL:-cross-encoder/ms-marco-MiniLM-L-6-v2}
      - MIN_SCORE_THRESHOLD=${MIN_SCORE_THRESHOLD:-0.35}
      - MIN_RERANK_SCORE=${MIN_RERANK_SCORE:-0.3}
      - PROMPT_VERSION=${PROMPT_VERSION:-v2}
      - AUTO_INGEST_AFTER_EXPORT=${AUTO_INGEST_AFTER_EXPORT:-1}
      - SESSION_CONTEXT_TURNS=${SESSION_CONTEXT_TURNS:-5}
      - VIRTUAL_HOST=knowledge-api.mcp.local
      - VIRTUAL_PROTO=http
      - VIRTUAL_PORT=8002
      - HTTPS_METHOD=noredirect
      - CERT_NAME=default.local
    env_file:
      - .env
    volumes:
      - .:/app/project_data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health/ready', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    depends_on:
      - qdrant
      - ollama
    networks:
      - ai_agent_net
      - shared_network

  agent_service:
    build:
      context: ./services/agent_service
    container_name: agent_service
    ports:
      - "8003"
    environment:
      - SERVICE_API_KEY=${SERVICE_API_KEY}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-120}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - KNOWLEDGE_SERVICE_URL=http://knowledge_service:8002
      - VIRTUAL_HOST=agent-api.mcp.local
      - VIRTUAL_PROTO=http
      - VIRTUAL_PORT=8003
      - HTTPS_METHOD=noredirect
      - CERT_NAME=default.local
    env_file:
      - .env
    volumes:
      - .:/app/project_data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health/ready', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      - qdrant
      - knowledge_service
    networks:
      - ai_agent_net
      - shared_network

networks:
  ai_agent_net:
    driver: bridge
  shared_network:
    external: true
    name: docker_global_bridge
